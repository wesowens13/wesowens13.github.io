<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kids Dead Reckoning Course</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            padding: 30px 20px;
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            font-size: 16px;
        }

        th {
            background-color: #f4f4f4;
            font-weight: 600;
        }

        .map-image {
            width: 100%;
            border-radius: 8px;
        }

        @media (min-width: 768px) {
            h1 {
                font-size: 32px;
            }

            th, td {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Gathering+Surf+City.png" alt="Logo" class="logo">

        <h1>Kids Dead Reckoning Course</h1>

        <table>
            <thead>
                <tr>
                    <th>From → To</th>
                    <th>Distance (m)</th>
                    <th>Bearing (° mag)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Kids 1 → Kids 2</td>
                    <td>40</td>
                    <td>315°</td>
                </tr>
                <tr>
                    <td>Kids 2 → Kids 3</td>
                    <td>54</td>
                    <td>90°</td>
                </tr>
                <tr>
                    <td>Kids 3 → Kids 4</td>
                    <td>50</td>
                    <td>233°</td>
                </tr>
                <tr>
                    <td>Kids 4 → Kids 5</td>
                    <td>42</td>
                    <td>128°</td>
                </tr>
                <tr>
                    <td>Kids 5 → Kids 1</td>
                    <td>32</td>
                    <td>324°</td>
                </tr>
            </tbody>
        </table>

        <img src="kids_course.jpg" alt="Kids Course Map" class="map-image">
    </div>

</body>
</html>
